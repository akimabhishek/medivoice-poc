version: '3.8'

services:
  medivoice:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # This seamlessly links your Windows folder to the container's folder
      - .:/app
    # This turns on the live-reloading server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload